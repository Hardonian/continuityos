name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.11"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest --cov=continuityos --cov-report=xml --cov-fail-under=85
      - run: uv build
      - run: PYTHONPATH=src uv run python scripts/demo.py > demo.json
      - run: python -m json.tool demo.json >/dev/null
      - run: PYTHONPATH=src uv run python scripts/evidence_smoke.py > evidence.json
      - run: python -m json.tool evidence.json >/dev/null
